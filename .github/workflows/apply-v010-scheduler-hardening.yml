name: Apply v0.1.0 scheduler hardening

on:
  push:
    branches:
      - agent/tempo-v0.1.0-hardening
    paths:
      - scripts/apply_v010_scheduler_hardening.py
      - .github/workflows/apply-v010-scheduler-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/tempo-v0.1.0-hardening
          fetch-depth: 0

      - name: Apply scheduler hardening
        run: python3 scripts/apply_v010_scheduler_hardening.py

      - name: Validate patch
        run: git diff --check

      - name: Commit hardened scheduler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden scheduler lifecycle and executor shutdown"
          git push origin HEAD:agent/tempo-v0.1.0-hardening

name: Apply v0.1.0 schedule hardening

on:
  push:
    branches:
      - agent/tempo-v0.1.0-hardening
    paths:
      - scripts/apply_v010_schedule_hardening.py
      - .github/workflows/apply-v010-schedule-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tempo-v0.1.0-hardening
          fetch-depth: 0

      - name: Apply and commit schedule hardening
        shell: bash
        run: |
          set +e
          python3 scripts/apply_v010_schedule_hardening.py > /tmp/schedule-hardening.log 2>&1
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            cp /tmp/schedule-hardening.log SCHEDULE_HARDENING_ERROR.txt
            git add -A
            git commit -m "Record schedule hardening patch failure"
            git push origin HEAD:agent/tempo-v0.1.0-hardening
            exit 0
          fi

          git diff --check
          git add -A
          git commit -m "Validate and bound schedule calculation"
          git push origin HEAD:agent/tempo-v0.1.0-hardening

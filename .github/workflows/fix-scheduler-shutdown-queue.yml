name: Fix scheduler shutdown queue

on:
  push:
    branches:
      - agent/tempo-v0.1.0-hardening
    paths:
      - scripts/fix_scheduler_shutdown_queue.py
      - .github/workflows/fix-scheduler-shutdown-queue.yml

concurrency:
  group: tempo-v010-shutdown-patch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tempo-v0.1.0-hardening
          fetch-depth: 0
      - run: python3 scripts/fix_scheduler_shutdown_queue.py
      - run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prevent late completion posts during shutdown"
          git push origin HEAD:agent/tempo-v0.1.0-hardening
